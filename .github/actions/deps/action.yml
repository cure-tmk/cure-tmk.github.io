name: Deps
description: Install Dependencies
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v3.0.0
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.node-version'
        cache: 'pnpm'
    - name: Install
      run: pnpm i --frozen-lockfile
      shell: bash
